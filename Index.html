<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>OpenChess - GAS Monolithic</title>
    <style>

:root {
    --bg-body: #312e2b; --bg-panel: #262421; --bg-sidebar: #21201d;
    --accent-green: #81b64c; --accent-hover: #a3d16a;
    --text-main: #ffffff; --text-dim: #bababa;
    --board-light: #eeeed2; --board-dark: #769656; --border: #403d39;
}
* { box-sizing: border-box; }
body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-body); color: var(--text-main);
    display: flex; height: 100vh; overflow: hidden;
}
#setup-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
}
.setup-card {
    background: var(--bg-panel); width: 450px; padding: 40px;
    border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid var(--border); text-align: center;
}
.setup-title { font-size: 28px; font-weight: 800; margin-bottom: 30px; color: var(--accent-green); }
.mode-selector { display: flex; gap: 15px; margin-bottom: 25px; }
.mode-option { flex: 1; padding: 20px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; }
.mode-option.active { border-color: var(--accent-green); background: rgba(129, 182, 76, 0.1); }
.mode-label { font-weight: 700; font-size: 16px; }
.mode-desc { font-size: 11px; color: var(--text-dim); margin-top: 5px; }
.app-container { display: flex; width: 100%; height: 100%; }
.side-nav { width: 150px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
.logo { font-weight: 800; font-size: 20px; color: var(--accent-green); margin-bottom: 40px; }
.main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
.game-area { display: flex; gap: 20px; max-width: 1200px; width: 100%; visibility: hidden; }
.board-container { flex: 0 0 600px; display: flex; flex-direction: column; gap: 10px; }
#board { width: 600px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; }
.info-panel { flex: 1; background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; max-height: 600px; }
.panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.move-list { flex-grow: 1; padding: 10px; overflow-y: auto; background: #2b2926; display: grid; grid-template-columns: 40px 1fr 1fr; font-size: 14px; }
.move-num { color: #666; font-weight: 600; }
.move-active { background: rgba(129, 182, 76, 0.2) !important; color: var(--accent-green); font-weight: 600; }
.panel-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
.primary-btn { background: var(--accent-green); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 700; cursor: pointer; }
.room-input { background: #1a1917; border: 1px solid var(--border); padding: 12px; color: white; border-radius: 6px; width: 100%; }
.player-card { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
.avatar { width: 40px; height: 40px; background: #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
.white-1e1d7 { background-color: var(--board-light) !important; }
.black-3c85d { background-color: var(--board-dark) !important; }

    </style>
</head>
<body>
    <div id='setup-overlay'><div class='setup-card'><div class='setup-title'>OpenChess</div>    <div class='mode-selector'><div class='mode-option active' id='mode-online'><div class='mode-label'>Play Online</div><div class='mode-desc'>Multiplayer via Cloud Sync</div></div>    <div class='mode-option' id='mode-offline'><div class='mode-label'>Play Offline</div><div class='mode-desc'>Local Board & Storage</div></div></div>    <div id='online-config'><label style='display: block; text-align: left; font-size: 11px; margin-bottom: 5px; color: var(--text-dim);'>ROOM ID</label>    <input type='text' id='setup-room-id' class='room-input' value='<?= room ?>'></div>    <button class='primary-btn' id='start-game-btn'>START GAME</button></div></div>    <div class='app-container'><nav class='side-nav'><div class='logo'>Chess</div></nav>    <main class='main-content'><div class='game-area' id='game-area'><div class='board-container'>    <div class='player-card'><div class='avatar'>?</div><div><div class='player-name'>Opponent</div><div class='player-status' id='opponent-status'>Waiting...</div></div></div>    <div id='board'></div><div class='player-card'><div class='avatar' style='background: var(--accent-green); color: white;'>P</div><div>    <div class='player-name'>You (<?= role ?>)</div><div class='player-status' id='my-status'>Initializing...</div></div></div></div>    <div class='info-panel'><div class='panel-header'><div id='game-mode-label' style='font-weight: 700;'>Live Game</div><div id='room-display'>ID: lobby-1</div></div>    <div class='move-list' id='move-history'></div><div class='panel-footer'><div id='game-status-text' style='text-align: center; font-weight: 600; font-size: 16px; color: var(--accent-green);'>Ready to Play</div>    <button class='primary-btn' style='font-size: 14px; padding: 10px; margin-top: 10px;' id='copy-link-btn'>Invite Opponent</button></div></div></div></main></div>

    <script>

const GAS_ROLE = '<?= role ?>';
const GAS_ROOM = '<?= room ?>';
const API_BASE = 'https://api.restful-api.dev/objects';
const STARTING_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';

let game = new Chess();
let board = null;
let roomId = GAS_ROOM;
let playerColor = GAS_ROLE === 'black' ? 'b' : 'w';
let isOnline = true;
let isSyncing = false;

window.onload = function() {
    const overlay = document.getElementById('setup-overlay');
    const startBtn = document.getElementById('start-game-btn');
    const onlineOpt = document.getElementById('mode-online');
    const offlineOpt = document.getElementById('mode-offline');
    const onlineConfig = document.getElementById('online-config');
    const setupRoomId = document.getElementById('setup-room-id');

    onlineOpt.onclick = () => {
        onlineOpt.classList.add('active'); offlineOpt.classList.remove('active');
        onlineConfig.style.display = 'block'; isOnline = true;
    };
    offlineOpt.onclick = () => {
        offlineOpt.classList.add('active'); onlineOpt.classList.remove('active');
        onlineConfig.style.display = 'none'; isOnline = false;
    };
    startBtn.onclick = () => {
        roomId = setupRoomId.value; overlay.style.display = 'none';
        document.getElementById('game-area').style.visibility = 'visible';
        initGame();
    };
};

function initGame() {
    document.getElementById('my-status').textContent = 'Role: ' + GAS_ROLE.charAt(0).toUpperCase() + GAS_ROLE.slice(1);
    document.getElementById('room-display').textContent = isOnline ? 'ID: ' + roomId : 'Local Mode';

    board = Chessboard('board', {
        draggable: true, position: game.fen(),
        orientation: playerColor === 'b' ? 'black' : 'white',
        onDragStart: (source, piece) => {
            if (game.game_over()) return false;
            if (isOnline && piece.search(new RegExp('^' + playerColor)) === -1) return false;
            if (isOnline && game.turn() !== playerColor) return false;
        },
        onDrop: (source, target) => {
            const move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateUI(); saveState();
        },
        onSnapEnd: () => board.position(game.fen()),
        pieceTheme: (piece) => PIECES_BASE64[piece]
    });
    updateUI();
    if (isOnline) setInterval(pollCloud, 1500);
}

function updateUI() {
    const statusText = document.getElementById('game-status-text');
    if (game.in_checkmate()) statusText.textContent = 'CHECKMATE!';
    else if (game.in_draw()) statusText.textContent = 'DRAW';
    else statusText.textContent = game.turn() === 'w' ? 'White turn' : 'Black turn';

    const history = game.history();
    const moveHistoryEl = document.getElementById('move-history');
    moveHistoryEl.innerHTML = '';
    for (let i = 0; i < history.length; i += 2) {
        const num = Math.floor(i / 2) + 1;
        moveHistoryEl.innerHTML += '<div class="move-num">' + num + '.</div><div class="move-val">' + history[i] + '</div><div class="move-val">' + (history[i+1] || '') + '</div>';
    }
    moveHistoryEl.scrollTop = moveHistoryEl.scrollHeight;
}

async function saveState() {
    const fen = game.fen();
    localStorage.setItem('chess_local_fen_' + roomId, fen);
    if (!isOnline || !navigator.onLine) return;
    try {
        isSyncing = true;
        await fetch(API_BASE + '/' + roomId, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: 'Chess Room ' + roomId, data: { fen: fen } })
        });
    } catch (e) {} finally { isSyncing = false; }
}

async function pollCloud() {
    if (!isOnline || !navigator.onLine || isSyncing) return;
    try {
        const response = await fetch(API_BASE + '/' + roomId);
        if (response.status === 404) return;
        const data = await response.json();
        const targetData = Array.isArray(data) ? data[0] : data;
        if (targetData && targetData.data && targetData.data.fen && targetData.data.fen !== game.fen()) {
            game.load(targetData.data.fen); board.position(game.fen());
            updateUI(); localStorage.setItem('chess_local_fen_' + roomId, targetData.data.fen);
        }
    } catch (e) {}
}

document.getElementById('copy-link-btn').onclick = () => {
    const baseUrl = window.location.href.split('?')[0];
    const opponentRole = GAS_ROLE === 'black' ? 'white' : 'black';
    navigator.clipboard.writeText(baseUrl + '?role=' + opponentRole + '&room=' + roomId).then(() => alert('Invite URL copied!'));
};

    </script>
